                    <div class="simple-gallery">

                        

                        <a class="g-thumb" href="gallery/abyss.jpg" target="_blank" rel="noopener">
                            <img src="gallery/abyss.jpg" data-caption="gta 6 wil came before this shit gonna done">
                        </a>

                        <a class="g-thumb" href="gallery/bye proton.jpg" target="_blank" rel="noopener">

    <!--ai generated-->>
    <div id="lightbox" class="lightbox">
        <span class="lb-close">&times;</span>
        <img class="lb-img" src="">
        <div class="lb-caption"></div>
    </div>

    <script>
        const lightbox = document.getElementById("lightbox");
        const lbImg = document.querySelector(".lb-img");
        const lbCaption = document.querySelector(".lb-caption");
        const closeBtn = document.querySelector(".lb-close");

        document.querySelectorAll(".g-thumb").forEach(link => {
            link.addEventListener("click", e => {
                e.preventDefault();

                const img = link.querySelector("img");
                lbImg.src = link.href;
                lbCaption.textContent = img.dataset.caption || "";

                lightbox.classList.add("active");
            });
        });

        closeBtn.addEventListener("click", () => {
            lightbox.classList.remove("active");
        });

        lightbox.addEventListener("click", e => {
            if (e.target === lightbox) {
                lightbox.classList.remove("active");
            }
        });
    </script>
</body>
